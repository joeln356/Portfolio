<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            border: 1px solid #1e3a5f;
            background: #0b1a2a;
        }

/* canto superior esquerdo */
.container::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 10px;
  height: 10px;
  border-top: 2px solid #3aa0ff;
  border-left: 2px solid #3aa0ff;
}

/* canto inferior direito */
.container::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 10px;
  height: 10px;
  border-bottom: 2px solid #3aa0ff;
  border-right: 2px solid #3aa0ff;
}
        .corner {
            position: absolute;
            width: 10px;
            height: 10px;
            }

            .top-right {
            top: 0;
            right: 0;
            border-top: 2px solid #3aa0ff;
            border-right: 2px solid #3aa0ff;
            }

            .bottom-left {
            bottom: 0;
            left: 0;
            border-bottom: 2px solid #3aa0ff;
            border-left: 2px solid #3aa0ff;
            }
    </style>
</head>
<body>
    <div class="container">
        oi
        <span class="corner top-right"></span>
        <span class="corner bottom-left"></span>
    </div>    
</body>

</html>
